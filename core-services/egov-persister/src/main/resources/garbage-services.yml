serviceMaps:
  serviceName: garbage-services
  mappings:
    - version: 1.0
      description: Persists garbage account
      fromTopic: save-grbg-account
      isTransaction: true
      queryMaps:

        - query: >
            INSERT INTO eg_grbg_account
            (
              id,
              uuid,
              garbage_id,
              property_id,
              type,
              name,
              mobile_number,
              gender,
              email_id,
              is_owner,
              user_uuid,
              declaration_uuid,
              status,
              additional_detail,
              created_by,
              created_date,
              last_modified_by,
              last_modified_date,
              tenant_id,
              parent_account,
              business_service,
              approval_date,
              is_active,
              channel
            )
            VALUES
            (
              ?,?,?,?,?,?,?,?,?,?,
              ?,?,?,?::JSONB,?,?,?,?,?,
              ?,?,?,?,?
            );

          basePath: $.garbageAccounts.*

          jsonMaps:

            - jsonPath: $.garbageAccounts.*.id

            - jsonPath: $.garbageAccounts.*.uuid

            - jsonPath: $.garbageAccounts.*.garbageId

            - jsonPath: $.garbageAccounts.*.propertyId

            - jsonPath: $.garbageAccounts.*.type

            - jsonPath: $.garbageAccounts.*.name

            - jsonPath: $.garbageAccounts.*.mobileNumber

            - jsonPath: $.garbageAccounts.*.gender

            - jsonPath: $.garbageAccounts.*.emailId

            - jsonPath: $.garbageAccounts.*.isOwner

            - jsonPath: $.garbageAccounts.*.userUuid

            - jsonPath: $.garbageAccounts.*.declarationUuid

            - jsonPath: $.garbageAccounts.*.status

            - jsonPath: $.garbageAccounts.*.additionalDetail
              type: JSON
              dbType: JSONB

            - jsonPath: $.garbageAccounts.*.auditDetails.createdBy

            - jsonPath: $.garbageAccounts.*.auditDetails.createdDate

            - jsonPath: $.garbageAccounts.*.auditDetails.lastModifiedBy

            - jsonPath: $.garbageAccounts.*.auditDetails.lastModifiedDate

            - jsonPath: $.garbageAccounts.*.tenantId

            - jsonPath: $.garbageAccounts.*.parentAccount

            - jsonPath: $.garbageAccounts.*.businessService

            - jsonPath: $.garbageAccounts.*.approvalDate

            - jsonPath: $.garbageAccounts.*.isActive

            - jsonPath: $.garbageAccounts.*.channel
        - query: >
            INSERT INTO eg_grbg_application
            (
              uuid,
              application_no,
              status,
              garbage_id
            )
            VALUES
            (
              ?, ?, ?, ?
            );

          basePath: $.garbageAccounts.*.grbgApplication

          jsonMaps:

            - jsonPath: $.garbageAccounts.*.grbgApplication.uuid

            - jsonPath: $.garbageAccounts.*.grbgApplication.applicationNo

            - jsonPath: $.garbageAccounts.*.grbgApplication.status

            - jsonPath: $.garbageAccounts.*.grbgApplication.garbageId   
            
            
        - query: >
            INSERT INTO eg_grbg_address
            (
              uuid,
              garbage_id,
              address_type,
              address1,
              address2,
              city,
              state,
              pincode,
              is_active,
              zone,
              ulb_name,
              ulb_type,
              ward_name,
              additional_detail
            )
            VALUES
            (
              ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?::JSONB
            );

          basePath: $.garbageAccounts.*.addresses.*

          jsonMaps:

            - jsonPath: $.garbageAccounts.*.addresses.*.uuid

            - jsonPath: $.garbageAccounts.*.addresses.*.garbageId

            - jsonPath: $.garbageAccounts.*.addresses.*.addressType

            - jsonPath: $.garbageAccounts.*.addresses.*.address1

            - jsonPath: $.garbageAccounts.*.addresses.*.address2

            - jsonPath: $.garbageAccounts.*.addresses.*.city

            - jsonPath: $.garbageAccounts.*.addresses.*.state

            - jsonPath: $.garbageAccounts.*.addresses.*.pincode

            - jsonPath: $.garbageAccounts.*.addresses.*.isActive

            - jsonPath: $.garbageAccounts.*.addresses.*.zone

            - jsonPath: $.garbageAccounts.*.addresses.*.ulbName

            - jsonPath: $.garbageAccounts.*.addresses.*.ulbType

            - jsonPath: $.garbageAccounts.*.addresses.*.wardName

            - jsonPath: $.garbageAccounts.*.addresses.*.additionalDetail
              type: JSON
              dbType: JSONB
              
              
              
        - query: >
            INSERT INTO eg_grbg_old_details
            (
              uuid,
              garbage_id,
              old_garbage_id
            )
            VALUES
            (
              ?, ?, ?
            );

          basePath: $.garbageAccounts.*.grbgOldDetails

          jsonMaps:

            - jsonPath: $.garbageAccounts.*.grbgOldDetails.uuid

            - jsonPath: $.garbageAccounts.*.grbgOldDetails.garbageId

            - jsonPath: $.garbageAccounts.*.grbgOldDetails.oldGarbageId
            
            
            
        - query: >
            INSERT INTO eg_grbg_collection_unit
            (
              uuid,
              unit_name,
              unit_ward,
              ulb_name,
              type_of_ulb,
              is_active,
              garbage_id,
              unit_type,
              category,
              sub_category,
              sub_category_type,
              isbplunit,
              isvariablecalculation,
              isbulkgeneration,
              no_of_units,
              ismonthlybilling
            )
            VALUES
            (
              ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?
            );

          basePath: $.garbageAccounts.*.grbgCollectionUnits.*

          jsonMaps:

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.uuid

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.unitName

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.unitWard

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.ulbName

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.typeOfUlb

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.isActive

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.garbageId

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.unitType

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.category

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.subCategory

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.subCategoryType

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.isbplunit

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.isvariablecalculation

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.isbulkgeneration

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.no_of_units

            - jsonPath: $.garbageAccounts.*.grbgCollectionUnits.*.ismonthlybilling